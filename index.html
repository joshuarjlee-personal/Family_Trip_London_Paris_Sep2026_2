<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Trip London and Paris Sep 2026</title>
<style>
:root{--blue:#1F4E79;--bl:#E8F4FD;--bm:#2E75B6;--green:#2E7D32;--gl:#E8F5E9;--orange:#E65100;--ol:#FFF3E0;--red:#C62828;--rl:#FFEBEE;--purple:#6A1B9A;--pl:#F3E5F5;--grey:#546E7A;--gryl:#F5F7FA;--sf:#fff;--bg:#f8f9fb;--tx:#1a1a2e;--tx2:#4a5568;--txm:#a0aec0;--bd:#e2e8f0;--sh:0 4px 16px rgba(0,0,0,0.06);--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--tx);line-height:1.5}
.top{background:linear-gradient(135deg,var(--blue),var(--bm));color:#fff;padding:16px 24px;position:sticky;top:0;z-index:1000;box-shadow:0 2px 12px rgba(31,78,121,0.3)}
.top-in{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.top h1{font-size:18px;font-weight:700}.top .meta{font-size:12px;opacity:0.8;margin-top:2px}
.cd{text-align:right}.cd .n{font-size:24px;font-weight:700}.cd .l{font-size:11px;opacity:0.7}
.nw{background:var(--sf);border-bottom:1px solid var(--bd);position:sticky;top:68px;z-index:999}
.nt{max-width:900px;margin:0 auto;display:flex;overflow-x:auto;padding:0 16px}
.nb{padding:14px 20px;font-size:13px;font-weight:600;color:var(--txm);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all 0.2s}
.nb:hover{color:var(--tx)}.nb.on{color:var(--blue);border-bottom-color:var(--blue)}
.wrap{max-width:900px;margin:0 auto;padding:20px 16px}
.vw{display:none}.vw.on{display:block}
.dc{background:var(--sf);border-radius:var(--r);margin:16px 0;overflow:hidden;border:1px solid var(--bd);transition:box-shadow 0.2s}
.dc:hover{box-shadow:var(--sh)}
.dh{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;user-select:none}
.dn{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;flex-shrink:0}
.di{flex:1}.di h3{font-size:15px;font-weight:700;margin-bottom:1px}.di p{font-size:13px;color:var(--tx2)}
.dcost{font-size:12px;font-weight:600;color:var(--green);background:var(--gl);padding:4px 10px;border-radius:20px}
.chv{color:var(--txm);transition:transform 0.3s;font-size:12px;display:inline-block}
.dc.open .chv{transform:rotate(180deg)}
.db{display:none;border-top:1px solid var(--bd)}.dc.open .db{display:block}
.ac{padding:16px 20px;border-bottom:1px solid var(--bd)}.ac:last-child{border-bottom:none}
.at{display:inline-block;background:var(--bl);color:var(--blue);font-size:11px;font-weight:700;padding:4px 8px;border-radius:6px;margin-bottom:6px}
.atl{font-size:15px;font-weight:600;margin-bottom:6px}
.ar{font-size:13px;color:var(--tx2);line-height:1.5;margin-bottom:10px;padding:8px 12px;background:var(--gryl);border-radius:8px;border-left:3px solid var(--bm)}
.ag{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ap{font-size:12px;padding:8px 10px;border-radius:8px;background:var(--bg)}
.ap .lb{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;color:var(--txm);margin-bottom:2px}.ap .vl{color:var(--tx);line-height:1.4}
.pb{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--purple);background:var(--pl);padding:3px 8px;border-radius:12px;margin-left:8px;font-weight:500}
.cs{margin-top:10px;padding-top:10px;border-top:1px dashed var(--bd)}
.ct{font-size:12px;color:var(--blue);cursor:pointer;font-weight:500}.ct:hover{text-decoration:underline}
.cl{margin-top:8px;display:none}.cl.sh{display:block}
.cm{display:flex;gap:8px;margin:6px 0;padding:8px 10px;background:var(--gryl);border-radius:8px;font-size:12px}
.ca{width:24px;height:24px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.ci{display:flex;gap:6px;margin-top:8px}
.ci input{flex:1;border:1px solid var(--bd);border-radius:6px;padding:8px 10px;font-size:12px;outline:none}
.ci input:focus{border-color:var(--blue)}
.ci button{background:var(--blue);color:#fff;border:none;border-radius:6px;padding:8px 12px;font-size:12px;cursor:pointer;font-weight:500}
.bc{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.bk{background:var(--sf);border-radius:var(--r);padding:16px;text-align:center;border:1px solid var(--bd)}
.bk .nm{font-size:14px;font-weight:600;margin-bottom:2px}
.bk .am{font-size:22px;font-weight:800;color:var(--blue)}
.bk .sb{font-size:11px;color:var(--txm);margin-top:4px}
.bt{text-align:center;padding:14px;background:var(--gl);border-radius:var(--r);margin-bottom:16px}
.ti{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:var(--sf);border-radius:var(--r);margin:8px 0;border:1px solid var(--bd)}
.ti.u{border-left:4px solid var(--red)}.ti.s{border-left:4px solid var(--orange)}.ti.b{border-left:4px solid var(--blue)}
.cb{width:22px;height:22px;border:2px solid var(--bd);border-radius:6px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s}

{time:"12:00-14:30",title:"Tower of London",how:"Tube: Green Park to Tower Hill.",tickets:"hrp.org.uk. Adult GBP 33.10 / Child GBP 18.50 / Under 5 FREE.",tips:"Crown Jewels FIRST (queue builds from 10:30). Beefeater tours every 30 min.",rationale:"THE must-do in London. Crown Jewels alone are worth the price of admission, and the Beefeater tours are genuinely hilarious (they are comedians in uniform). Kids will be fascinated by armour, swords, and the legendary ravens. Do this on Day 2 while energy and excitement are at peak.",cost:"~GBP 206",photo:true},

{day:5,date:"18 Sep (Fri)",loc:"Notts to Windsor to London",color:"#AD1457",summary:"Windsor Castle on the drive back",cost:"~GBP 350",acts:[

// countdown
var trip=new Date(2026,8,14);
var now=new Date();
var diff=Math.ceil((trip-now)/(86400000));
document.getElementById("cdnum").textContent=diff>0?diff:"0";

// render
buildItin();buildBudget();buildTodos();buildInfo();

// events
document.addEventListener("click",function(e){
var el=e.target;
var dh=el.closest(".dh");
if(dh){var day=dh.getAttribute("data-d");document.getElementById("dc"+day).classList.toggle("open");return;}
var ct=el.closest(".ct");
if(ct){var k=ct.getAttribute("data-k");document.getElementById("cl"+k).classList.toggle("sh");return;}
var pb=el.closest(".pb2");
if(pb){
var k=pb.getAttribute("data-k");
var inp=document.getElementById("in"+k);
var txt=inp.value.trim();
if(txt){
if(!comments[k])comments[k]=[];
var name=prompt("Your name:");
if(!name)name="Guest";
comments[k].push({n:name,t:txt});
inp.value="";
buildItin();
document.getElementById("dc"+DAYS[parseInt(k.split("_")[0])].day).classList.add("open");
document.getElementById("cl"+k).classList.add("sh");
}
return;
}
var cb=el.closest(".cb");
if(cb){cb.classList.toggle("ck");cb.innerHTML=cb.classList.contains("ck")?"&#10003;":"";return;}
var nb=el.closest(".nb");
if(nb){
var v=nb.getAttribute("data-v");
var views=document.querySelectorAll(".vw");
var tabs=document.querySelectorAll(".nb");
for(var i=0;i<views.length;i++)views[i].classList.remove("on");
for(var i=0;i<tabs.length;i++)tabs[i].classList.remove("on");
document.getElementById("v-"+v).classList.add("on");
nb.classList.add("on");
return;
}
});
document.addEventListener("keydown",function(e){
if(e.key==="Enter"&&e.target.tagName==="INPUT"&&e.target.closest(".ci")){
var btn=e.target.parentNode.querySelector(".pb2");
if(btn)btn.click();
}
});
})();
